name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    # The product promise is "one static binary, no runtime": verify the portable
    # build + full suite on Linux (glibc) AND macOS (Apple Silicon) every push.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build (release) + test suite
        run: |
          ./scripts/build.sh
          ./scripts/test.sh

      - name: Build (ASan/UBSan) + test suite
        run: |
          ./scripts/build.sh debug
          ./scripts/test.sh
